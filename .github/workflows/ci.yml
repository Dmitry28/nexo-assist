name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Dead code check
        run: npm run check:dead-code

      - name: Unit tests
        run: npm run test:cov

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run migration:run

      - name: E2E tests
        run: npm run test:e2e

  docker-and-k8s:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to GHCR
    steps:
      - uses: actions/checkout@v7

      - name: Validate k8s manifests
        run: kubectl kustomize k8s/ > /dev/null

      # QEMU + buildx: build arm64 too, since the target k3s node is ARM (Oracle Ampere);
      # amd64 stays for local dev / other runtimes. Cross-arch build is emulated (slower).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Push only on branch pushes (dev/main); PRs just build to validate the Dockerfile.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }} # metadata-action lowercases the name
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
