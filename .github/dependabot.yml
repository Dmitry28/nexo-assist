version: 2
updates:
  - package-ecosystem: npm
    directory: /
    # Land bumps on dev; they reach main via the normal dev -> main flow.
    target-branch: dev
    schedule:
      interval: weekly
    # One PR for all minor/patch bumps; majors stay individual.
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Types must track the runtime major (.nvmrc / engines / Dockerfile) —
      # bump @types/node together with Node, not on its own releases.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
