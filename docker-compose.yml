# Local development / simple single-host deploy.
#   npm run db:up            # just Postgres (dev: run the app with npm run start:dev)
#   docker compose up --build  # full stack (app + Postgres)

services:
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
    env_file:
      # Optional: app boots on defaults from env.validation.ts without a .env file.
      - path: .env
        required: false
    # Healthcheck is inherited from the image (see Dockerfile HEALTHCHECK).
    # depends_on on postgres is wired in 3.1b, when the app connects to the DB.

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
