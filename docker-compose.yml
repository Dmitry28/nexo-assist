# Local development / simple single-host deploy.
#   npm run db:up            # just Postgres (dev: run the app with npm run start:dev)
#   docker compose up --build  # full stack (app + Postgres)

services:
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      # APP_ENV drives app behavior (JSON logs, token required, Swagger off). Without it
      # appEnv falls back to development and the runtime image crashes on the pruned
      # pino-pretty transport. The dev override sets it back to development.
      APP_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://app:app@postgres:5432/app
    env_file:
      # Optional: app boots on defaults from env.validation.ts without a .env file.
      - path: .env
        required: false
    # Healthcheck is inherited from the image (see Dockerfile HEALTHCHECK).
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
