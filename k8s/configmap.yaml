apiVersion: v1
kind: ConfigMap
metadata:
  name: nexo-assist-config
  labels:
    app.kubernetes.io/name: nexo-assist
data:
  NODE_ENV: 'production'
  # Deployment stage — drives app behavior (set to 'staging' on the dev-branch deploy).
  APP_ENV: 'production'
  PORT: '3000'
  # Cron for the daily subscription check (09:00 UTC).
  WATCH_CRON: '0 9 * * *'
  # Pacing between subscription polls: base delay + random 0..jitter (ms).
  WATCH_MIN_DELAY_MS: '2000'
  WATCH_JITTER_MS: '3000'
  # Owner's Telegram id for the admin-only /stats command (optional, no default).
  ADMIN_TELEGRAM_ID: '377250974'
  API_PREFIX: 'api'
  API_VERSION: '1'
  LOG_LEVEL: 'info'
  # Empty = block all cross-origin (the bot has no browser client; health/metrics are
  # server-to-server and unaffected). Set your real origin(s) if a browser client is added.
  CORS_ORIGIN: ''
  THROTTLE_TTL: '60'
  THROTTLE_LIMIT: '100'
  # Set to your collector to enable tracing (leave unset to disable):
  # OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector:4318'
  # OTEL_SERVICE_NAME: 'nexo-assist'
