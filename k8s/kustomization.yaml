# Apply everything with:  kubectl apply -k k8s/
# Override the image per environment:  kustomize edit set image nexo-assist=registry/nexo-assist:<sha>
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
# NOTE: no HPA/PDB — the app is a single-replica long-polling bot with in-memory
# state; autoscaling/disruption budgets return with webhook + DB (Phase 3+).

# Stamps every resource's metadata (not selectors — those are declared per-manifest).
labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
