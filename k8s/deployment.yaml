apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexo-assist
  labels:
    app.kubernetes.io/name: nexo-assist
spec:
  # NOTE: singleton by design — grammY long polling allows one poller per token
  # (a second pod gets Telegram 409s) and the store is in-memory (each replica
  # would hold disjoint subscriptions). Scale out only after webhook + DB land.
  replicas: 1
  # Recreate: a rolling update would briefly run two pollers (409s).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nexo-assist
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexo-assist
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: '/api/v1/metrics'
        prometheus.io/port: '3000'
    spec:
      # Pod-level hardening.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Writable scratch space — required because the container rootfs is read-only.
      volumes:
        - name: tmp
          emptyDir: {}
      # Apply DB migrations before the app starts. Same image, plain node on the compiled
      # data-source (migration:run:prod). Idempotent (TypeORM migrations table); a failure
      # here blocks startup, so the app never runs against an unmigrated schema.
      initContainers:
        - name: migrate
          image: nexo-assist:latest # kept in sync with the app image by CD (kustomize sets both)
          imagePullPolicy: IfNotPresent
          command:
            [
              'node',
              './node_modules/typeorm/cli.js',
              'migration:run',
              '-d',
              'dist/database/data-source.js',
            ]
          envFrom:
            - configMapRef:
                name: nexo-assist-config
            # DATABASE_URL lives in the Secret (Neon URL has a password) — see README.
            - secretRef:
                name: nexo-assist-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: app
          image: nexo-assist:latest # set by your CD pipeline (e.g. registry/nexo-assist:<sha>)
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: nexo-assist-config
            # TELEGRAM_BOT_TOKEN lives here — create the Secret first (see README);
            # production refuses to boot without the token.
            - secretRef:
                name: nexo-assist-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 512Mi
          # NOTE: probe paths must match API_PREFIX/API_VERSION from the ConfigMap.
          # Liveness: is the process alive? Restart on failure. Cheap, no deps.
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness: can we serve traffic? Checks dependencies. Removed from
          # the Service endpoints (not restarted) while failing.
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Startup: gives slow boots room before liveness kicks in.
          startupProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            periodSeconds: 5
            failureThreshold: 12
          # Delay SIGTERM: endpoint removal from the Service propagates asynchronously,
          # so without this in-flight requests can land on a pod already shutting down.
          lifecycle:
            preStop:
              exec:
                command: ['sleep', '5']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # Container-level hardening.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
