apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexo-assist
  labels:
    app.kubernetes.io/name: nexo-assist
spec:
  # Voluntary disruptions (node drain, cluster upgrade) keep at least one pod serving.
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexo-assist
